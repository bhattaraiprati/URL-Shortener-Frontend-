server {
    listen 80;
    
    # Root directory where the static files are served
    root   /usr/share/nginx/html;
    index  index.html index.htm;

    # Proxy API requests to the backend (running on your local machine)
    location /api/ {
        # host.docker.internal is used to access localhost on the host machine from inside the Docker container
        proxy_pass http://host.docker.internal:5000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Handles client-side routing (React Router)
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Optional: Cache static assets for better performance
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg)$ {
        expires 1y;
        add_header Cache-Control "public, max-age=31536000";
    }
}
